<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Gonçalo - App Completa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body, html{font-family:'Helvetica Neue', Arial,sans-serif;transition:0.3s;}
body.light{background:#f5f5f7;color:#333;}
body.dark{background:#121212;color:#eee;}
.app{max-width:420px;margin:auto;padding:15px;}
.header{background:#d71c1c;color:white;padding:35px 25px;border-radius:30px;text-align:center;margin-bottom:20px;box-shadow:0 5px 25px rgba(0,0,0,0.25);}
.header h1{font-size:28px;font-weight:700;text-shadow:1px 1px 2px rgba(0,0,0,0.2);}
.header p{margin-top:6px;font-size:16px;opacity:0.9;}
.tabs{display:flex;justify-content:space-around;margin-bottom:15px;flex-wrap:wrap;}
.tab-button{padding:10px 12px;border:none;border-radius:12px;background:#ddd;cursor:pointer;font-weight:600;transition:all 0.3s;margin:3px;}
.tab-button.active{background:#d71c1c;color:white;}
.card{border-radius:22px;padding:18px 20px;margin-bottom:15px;box-shadow:0 5px 18px rgba(0,0,0,0.1);position:relative;transition:all 0.3s;}
body.dark .card{background:#2b2b2b;color:#eee;box-shadow:0 4px 14px rgba(0,0,0,0.5);}
.card.total-card{background:linear-gradient(135deg,#d71c1c,#a80000);color:white;text-align:center;animation:pulse 2s infinite;}
body.dark .card.total-card{background: linear-gradient(135deg, #8b0000, #500000);}
.card.total-card h2{font-size:32px;font-weight:700;margin-top:8px;}
.card.small{display:flex;justify-content:space-between;padding:14px 18px;background:white;border-radius:18px;box-shadow:0 4px 14px rgba(0,0,0,0.06);margin-bottom:12px;transition:0.3s;}
body.dark .card.small{background:#2b2b2b;color:#eee;box-shadow:0 4px 14px rgba(0,0,0,0.5);}
.card.small span{font-size:14px;font-weight:500;color:#333;}
body.dark .card.small span{color:#eee;}
.card.small strong{font-size:16px;font-weight:600;color:#d71c1c;}
.list h3{margin-bottom:12px;font-size:20px;color:#d71c1c;font-weight:600;}
.item{display:flex;justify-content:space-between;align-items:center;background:white;padding:14px 18px;border-radius:18px;margin-bottom:10px;box-shadow:0 3px 10px rgba(0,0,0,0.08);position:relative;transition:0.2s;}
body.dark .item{background:#2b2b2b;box-shadow:0 3px 10px rgba(0,0,0,0.5);}
.item:hover{transform:translateY(-2px);}
.item span{font-size:16px;font-weight:500;}
.item input{width:90px;text-align:right;border:none;font-size:16px;font-weight:600;border-radius:8px;padding:5px;transition:all 0.2s;background:#f9f9f9;color:#333;}
body.dark .item input{background:#3a3a3a;color:#eee;}
.item input:focus{outline:none;background:#fff;box-shadow:0 0 5px rgba(0,0,0,0.15);}
.divider{height:1px;background:#eee;margin:15px 0;}
body.dark .divider{background:#555;}
.add-button{background:#d71c1c;color:white;border:none;padding:8px 12px;border-radius:12px;font-weight:600;cursor:pointer;margin:10px 0;transition:0.3s;}
.add-button:hover{background:#a80000;}
.delete-btn{background:none;border:none;color:red;font-size:18px;cursor:pointer;margin-left:10px;}
@keyframes pulse{0%{box-shadow:0 0 0 rgba(215,28,28,0.4);}70%{box-shadow:0 0 20px rgba(215,28,28,0.4);}100%{box-shadow:0 0 0 rgba(215,28,28,0.4);}}
#grafico-container{background:white;padding:15px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,0.06);margin-top:20px;}
body.dark #grafico-container{background:#2b2b2b;box-shadow:0 4px 14px rgba(0,0,0,0.5);}
.sub-aba-mes button{margin:3px;padding:6px 10px;border-radius:10px;border:none;background:#ddd;cursor:pointer;}
.sub-aba-mes button.active{background:#d71c1c;color:white;}
body.dark .sub-aba-mes button{background:#555;color:#eee;}
body.dark .sub-aba-mes button.active{background:#d71c1c;color:white;}
table{width:100%;border-collapse:collapse;}
th,td{padding:6px 8px;text-align:left;}
th{border-bottom:2px solid #d71c1c;}
</style>
</head>
<body class="light">
<div class="app">
<header class="header">
  <h1>Olá Gonçalo!</h1>
  <p>Bem-vindo ao seu Banco</p>
  <button class="add-button" onclick="toggleDarkMode()">Dark / Light Mode</button>
</header>

<div class="tabs">
  <button class="tab-button active" onclick="abrirAba('saldos', this)">Saldos</button>
  <button class="tab-button" onclick="abrirAba('movimentos', this)">Movimentos</button>
  <button class="tab-button" onclick="abrirAba('planeamento', this)">Planeamento</button>
</div>

<div id="saldos" class="tab-content">
  <section class="card total-card">
    <span>Fluxo Total</span>
    <h2>€ <span id="total">0.00</span></h2>
  </section>
  <section class="card small"><span>Sem moedas</span><strong>€ <span id="sem-moedas">0.00</span></strong></section>
  <section class="card small"><span>Sem moedas e sem cartão</span><strong>€ <span id="sem-moedas-cartao">0.00</span></strong></section>
  <div class="divider"></div>
  <section class="list" id="lista-saldos"><h3>Saldos</h3></section>
  <div id="grafico-container"><canvas id="saldoGrafico" width="400" height="200"></canvas></div>
</div>

<div id="movimentos" class="tab-content" style="display:none;">
  <button class="add-button" onclick="mostrarFormMovimento()">+ Adicionar Movimento</button>
  <div id="novo-movimento" style="display:none;">
    <label>Tipo:</label>
    <select id="tipo-movimento">
      <option value="ganho">Ganho</option>
      <option value="gasto">Gasto</option>
    </select>
    <label>Valor (€):</label>
    <input type="number" id="valor-movimento">
    <label>Descrição:</label>
    <input type="text" id="descricao-movimento">
    <label>Aba:</label>
    <select id="aba-movimento"></select>
    <label>Data (opcional):</label>
    <input type="date" id="data-movimento">
    <button class="add-button" onclick="adicionarMovimento()">Salvar Movimento</button>
  </div>
  <div class="divider"></div>
  <div class="sub-aba-mes" id="sub-abas-meses"></div>
  <div id="resumo-mensal"></div>
  <div id="lista-movimentos-mensal"></div>
</div>

<div id="planeamento" class="tab-content" style="display:none;">
  <label>Selecione Aba:</label>
  <select id="planeamento-aba" onchange="mostrarPlaneamento(this.value)">
    <option value="Money 2026">Money 2026</option>
    <option value="Dela">Dela</option>
  </select>
  <div id="tabela-planeamento"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let abas = JSON.parse(localStorage.getItem('abas')) || {
    "Ibiza":245,"Dela":4010,"Money 2026":2775,"Notas de 5 (capa)":100,
    "Capa 1 (azul)":50,"Capa 2 (caixa Apple)":55,"Porta cartões":25,
    "Capa 3 (preta MagSafe)":50,"Cartão":19.62,"Capa 4 (iPhone 13)":60,
    "Capa 5 (azul)":15,"Capa Apple Azul Escura":0,"Moedas carteira":131.92
};
localStorage.setItem('abas', JSON.stringify(abas));

let movimentos = JSON.parse(localStorage.getItem('movimentos')) || {};
let extrasAbas = ["Avô","Pais"];
let saldoGrafico;

function toggleDarkMode(){
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
}

function abrirAba(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

// SALDOS
function atualizarTotais(){
  let total=0, semMoedas=0, semCartao=0;
  for(const nome in abas){
    total+=abas[nome];
    if(nome!=="Moedas carteira") semMoedas+=abas[nome];
    if(nome!=="Moedas carteira" && nome!=="Cartão") semCartao+=abas[nome];
  }
  document.getElementById('total').textContent = total.toFixed(2);
  document.getElementById('sem-moedas').textContent = semMoedas.toFixed(2);
  document.getElementById('sem-moedas-cartao').textContent = semCartao.toFixed(2);
  localStorage.setItem('abas',JSON.stringify(abas));
}

function atualizarSaldosLista(){
  const lista=document.getElementById('lista-saldos');
  lista.innerHTML='<h3>Saldos</h3>';
  for(const nome in abas){
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<span>${nome}</span><input type="number" value="${abas[nome]}" data-nome="${nome}" oninput="atualizarSaldo(this)">`;
    lista.appendChild(div);
  }
  atualizarTotais();
  atualizarGrafico();
}

function atualizarSaldo(input){
  const nome=input.dataset.nome;
  abas[nome]=parseFloat(input.value)||0;
  atualizarTotais();
  atualizarGrafico();
  localStorage.setItem('abas',JSON.stringify(abas));
}

function atualizarGrafico(){
  const ctx=document.getElementById('saldoGrafico').getContext('2d');
  const labels=Object.keys(abas);
  const data=Object.values(abas);
  if(saldoGrafico) saldoGrafico.destroy();
  saldoGrafico=new Chart(ctx,{
    type:'bar',
    data:{labels:labels,datasets:[{label:'Saldo (€)',data:data,backgroundColor:'rgba(215,28,28,0.7)'}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });
}

// MOVIMENTOS
function mostrarFormMovimento(){
  const f=document.getElementById('novo-movimento');
  f.style.display=f.style.display==='none'?'block':'none';
}

function preencherSelectAbas(){
  const s=document.getElementById('aba-movimento');
  s.innerHTML='';
  Object.keys(abas).forEach(n=>{let o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});
  extrasAbas.forEach(e=>{let o=document.createElement('option');o.value=e;o.textContent=e;s.appendChild(o);});
}

function adicionarMovimento(){
  const tipo=document.getElementById('tipo-movimento').value;
  const valor=parseFloat(document.getElementById('valor-movimento').value)||0;
  const aba=document.getElementById('aba-movimento').value;
  const desc=document.getElementById('descricao-movimento').value;
  let data=document.getElementById('data-movimento').value||new Date().toISOString().split('T')[0];
  if(valor<=0||!aba||!desc){alert('Preencha todos os campos!');return;}
  if(!extrasAbas.includes(aba)){
    if(abas[aba]===undefined) abas[aba]=0;
    abas[aba]+=(tipo==='gasto'?-valor:valor);
    atualizarTotais();
    atualizarGrafico();
  }
  const mesAno=data.slice(0,7);
  if(!movimentos[mesAno]) movimentos[mesAno]=[];
  movimentos[mesAno].push({tipo,tipoValor:(tipo==='gasto'?-valor:valor),valor,aba,desc,data});
  localStorage.setItem('movimentos', JSON.stringify(movimentos));

  document.getElementById('valor-movimento').value='';
  document.getElementById('descricao-movimento').value='';
  document.getElementById('data-movimento').value='';

  atualizarSubAbasMensais();
  mostrarMovimentosMes(mesAno);
}

function atualizarSubAbasMensais(){
  const c=document.getElementById('sub-abas-meses');
  c.innerHTML='';
  Object.keys(movimentos).sort().forEach((m,index)=>{
    const b=document.createElement('button');
    b.textContent=m;
    b.onclick=()=>mostrarMovimentosMes(m);
    if(index===Object.keys(movimentos).length-1) b.classList.add('active');
    c.appendChild(b);
  });
}

function mostrarMovimentosMes(m){
  const c=document.getElementById('lista-movimentos-mensal');
  document.querySelectorAll('#sub-abas-meses button').forEach(b=>b.classList.remove('active'));
  const btn = Array.from(document.querySelectorAll('#sub-abas-meses button')).find(b=>b.textContent===m);
  if(btn) btn.classList.add('active');

  c.innerHTML=`<h4>Movimentos de ${m}</h4>`;
  if(!movimentos[m] || movimentos[m].length===0){c.innerHTML+='<p>Nenhum movimento neste mês.</p>';return;}

  let entradas=0, gastos=0;
  movimentos[m].forEach(x=>{if(x.tipo==='ganho') entradas+=x.valor; else gastos+=x.valor;});
  let fluxo=entradas+gastos;
  document.getElementById('resumo-mensal').innerHTML=`<div class="card small">Entradas: €${entradas.toFixed(2)} | Saídas: €${gastos.toFixed(2)} | Fluxo Total: €${fluxo.toFixed(2)}</div>`;

  movimentos[m].forEach((x,i)=>{
    const d=document.createElement('div');
    d.className='item '+(x.tipo==='gasto'?'negativo':'positivo');
    d.innerHTML=`<span>${x.data} - ${x.aba} - ${x.desc}</span>
                   <div>
                     <input type="text" value="${x.tipoValor.toFixed(2)} €" readonly>
                     <button class="delete-btn" onclick="apagarMovimento('${m}',${i})">🗑️</button>
                   </div>`;
    c.appendChild(d);
  });
}

function apagarMovimento(mes, idx){
  const mov = movimentos[mes][idx];
  if(!extrasAbas.includes(mov.aba)) abas[mov.aba]-=mov.tipoValor;
  movimentos[mes].splice(idx,1);
  localStorage.setItem('movimentos', JSON.stringify(movimentos));
  atualizarTotais();
  atualizarGrafico();
  mostrarMovimentosMes(mes);
}

// PLANEAMENTO - TODOS OS MESES
const planeamentoData={
  "Money 2026":[
    {mes:'Janeiro',entradas:60,gastos:120,saldo:2835},
    {mes:'Fevereiro',entradas:50,gastos:0,saldo:2885},
    {mes:'Março',entradas:50,gastos:0,saldo:2935},
    {mes:'Abril',entradas:60,gastos:70,saldo:2925},
    {mes:'Maio',entradas:50,gastos:0,saldo:2975},
    {mes:'Junho',entradas:350,gastos:60,saldo:3265},
    {mes:'Julho',entradas:60,gastos:30,saldo:3295},
    {mes:'Agosto',entradas:60,gastos:50,saldo:3305},
    {mes:'Setembro',entradas:60,gastos:110,saldo:3255},
    {mes:'Outubro',entradas:50,gastos:0,saldo:3305},
    {mes:'Novembro',entradas:50,gastos:0,saldo:3355},
    {mes:'Dezembro',entradas:0,gastos:0,saldo:3355}
  ],
  "Dela":[
    {mes:'Janeiro',entradas:0,gastos:0,saldo:4010},
    {mes:'Fevereiro',entradas:0,gastos:0,saldo:4010},
    {mes:'Março',entradas:0,gastos:0,saldo:4010},
    {mes:'Abril',entradas:0,gastos:0,saldo:4010},
    {mes:'Maio',entradas:0,gastos:0,saldo:4010},
    {mes:'Junho',entradas:0,gastos:0,saldo:4010},
    {mes:'Julho',entradas:0,gastos:0,saldo:4010},
    {mes:'Agosto',entradas:0,gastos:0,saldo:4010},
    {mes:'Setembro',entradas:0,gastos:0,saldo:4010},
    {mes:'Outubro',entradas:0,gastos:0,saldo:4010},
    {mes:'Novembro',entradas:0,gastos:0,saldo:4010},
    {mes:'Dezembro',entradas:0,gastos:0,saldo:4010}
  ]
};

function mostrarPlaneamento(aba){
  const c=document.getElementById('tabela-planeamento');
  c.innerHTML='';
  const dados = planeamentoData[aba];
  if(!dados){c.innerHTML='Sem dados'; return;}
  let html='<table><tr><th>Mês</th><th>Entradas (€)</th><th>Gastos (€)</th><th>Saldo (€)</th></tr>';
  dados.forEach(d=>{
    html+=`<tr><td>${d.mes}</td><td>${d.entradas.toFixed(2)}</td><td>${d.gastos.toFixed(2)}</td><td>${d.saldo.toFixed(2)}</td></tr>`;
  });
  html+='</table>';
  c.innerHTML = html;
}

// INICIALIZAÇÃO
window.onload = function() {
  preencherSelectAbas();
  atualizarSaldosLista();
  atualizarSubAbasMensais();
  const ultMes = Object.keys(movimentos).sort().pop();
  if(ultMes) mostrarMovimentosMes(ultMes);
  mostrarPlaneamento('Money 2026');
};
</script>
</body>
</html>
